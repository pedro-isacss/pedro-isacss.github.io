<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./images/logo.svg" type="image/x-icon">
  <link rel="stylesheet" href="./styles/index.css">
  <script src="./scripts/svginjector.js"></script>
  <title>Pedro Isac | Front-end developer and UI designer</title>
</head>

<body>
  <!-- ====== HEADER ===== -->
  <header class="flex-r-b-c p-4">
    <!-- === LEFT COLUMN === -->
    <div class="social flex-c-c-c">
      <a href="https://github.com/pedro-isacss" target="__blank">
        <img src="./images/github.svg" alt="github">
      </a>
      <a class="mt-3" href="https://www.instagram.com/ss.pedroisac/" target="__blank">
        <img src="./images/instagram.svg" alt="instagram">
      </a>
      <img class="mt-3 mb-3" src="./images/arrowup.svg" alt="arrow up">
      <span class="vertical-text">Social</span>
    </div>
    <!-- === CENTER === -->
    <div class="services flex-c-c-c">
      <h1 class="flex-r-c-c h1">
        <img class="mr-2 draw-animation-infinite" src="./images/line-logo.svg" alt="Pedro Isac"
          onload="SVGInject(this)">
        Pedro Isac
      </h1>
      <p class="mt-3 mb-3 p">Front-end developer and UI designer</p>
      <a class="main-btn" href="https://www.fiverr.com/sspedroisac" target="__blank">Services</a>
      <div class="music-controller mt-5">
        <audio id="musics" src="./music/music01.mp3"></audio>
        <button id="play-pause-music">
          <img id="play-pause-music-icon" src="./images/play.svg" alt="play music">
        </button>
        <button id="skip-music">
          <img src="./images/skip.svg" alt="skip music">
        </button>
      </div>
    </div>
    <!-- === RIGHT COLUMN === -->
    <div class="projects flex-c-c-c">
      <span class="vertical-text">Projects</span>
      <img class="mt-3 mb-3" src="./images/arrowdown.svg" alt="arrowdown">
      <a href="#">
        <img src="./images/suitcase.svg" alt="projects">
      </a>
    </div>
  </header>
  <!-- ===== Projects ===== -->
  <section class="flex-c-c-c p-4" id="projects-container">
    <h2 class="h2">Some projects</h2>
    <div class="mt-5">

    </div>
  </section>
  <script src="./scripts/home.js"></script>
</body>

</html>
