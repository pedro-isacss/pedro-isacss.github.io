<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/home.css">
  <title>Pedro Isac | Front-end developer and UI designer</title>
</head>

<body>
  <!-- ===== HEADER ===== -->
  <header>
    <a href="#">
      <img src="./images/logo.svg" alt="Pedro Isac" onload="SVGInject(this)">
    </a>
    <nav>
      <ul>
        <li><a href="#">Link Beta</a></li>
        <li><a href="#">Link Beta</a></li>
        <li><a href="#">Link Beta</a></li>
      </ul>
    </nav>
  </header>
  <!-- ====== MAIN ===== -->
  <section class="main">
    <div class="social">
      <a href="https://github.com/pedro-isacss">
        <img src="./images/github.svg" alt="github">
      </a>
      <a href="https://www.linkedin.com/in/pedro-isacss/">
        <img src="./images/linkedin.svg" alt="linkedin">
      </a>
      <a href="https://www.instagram.com/ss.pedroisac/">
        <img src="./images/instagram.svg" alt="instagram">
      </a>
      <img src="./images/arrowup.svg" alt="arrow up">
      <span>Social</span>
    </div>
    <div class="services">
      <h1>Pedro Isac</h1>
      <p>Front-end developer and UI designer</p>
      <a href="#">Services</a>
      <div class="music-controller">
        <button>
          <img src="./images/play.svg" alt="play music">
        </button>
        <button>
          <img src="./images/skip.svg" alt="skip music">
        </button>
      </div>
    </div>
    <div class="projects">
      <span>Projects</span>
      <img src="./images/arrowdown.svg" alt="arrowdown">
      <a href="#">
        <img src="./images/suitcase.svg" alt="projects">
      </a>
    </div>
  </section>
  <script src="./scripts/svginjector.js"></script>
</body>

</html>
