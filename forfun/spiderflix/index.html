<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpiderFlix</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- SIDE BAR -->
      <div class="sidebar-container">
        <input type="text" id="search" placeholder="Search..." />
        <div class="sidebar">
          <!-- LAST RELEASES -->
          <div class="last-releases-container">
            <span>Last releases</span>
            <a href="#" class="last-episode"
              >Spider-Man vs Doctor Octopus
              <img
                src="images/play-circle-outline.png"
                alt="play-circle-outline"
              />
            </a>
            <a href="#" class="last-episode"
              >Spider-Man vs Dennis Carradine
              <img
                src="images/play-circle-outline.png"
                alt="play-circle-outline"
              />
            </a>
            <a href="#" class="last-episode"
              >Spider-Man vs Venom
              <img
                src="images/play-circle-outline.png"
                alt="play-circle-outline"
              />
            </a>
            <div>
              <canvas class="divisor"></canvas>
              <button>
                <img src="./images/menu-down.png" alt="menu-down" />
              </button>
            </div>
          </div>

          <!-- POPULAR MOVIES -->
          <div class="popular-container">
            <span>Popular movies</span>
            <div class="popular-content">
              <div>
                <a href="#" style="background-image: url(./images/movie1.jpg)">
                  <img
                    src="./images/play-circle-outline.png"
                    alt="play-circle-outline"
                    class="play-hover"
                  />
                </a>
              </div>
              <div>
                <a href="#" style="background-image: url(./images/movie2.jpg)">
                  <img
                    src="./images/play-circle-outline.png"
                    alt="play-circle-outline"
                    class="play-hover"
                  />
                </a>
              </div>
            </div>
            <a href="#" class="btn-popular-content">See all movies</a>
          </div>
          <canvas class="divisor"></canvas>
          <!-- POPULAR SERIES -->
          <div class="popular-container">
            <span>Popular series</span>
            <div class="popular-content">
              <div>
                <a href="#" style="background-image: url(./images/serie1.jpg)">
                  <img
                    src="./images/play-circle-outline.png"
                    alt="play-circle-outline"
                    class="play-hover"
                  />
                </a>
              </div>
              <div>
                <a href="#" style="background-image: url(./images/serie2.jpg)">
                  <img
                    src="./images/play-circle-outline.png"
                    alt="play-circle-outline"
                    class="play-hover"
                  />
                </a>
              </div>
            </div>
            <a href="#" class="btn-popular-content">See all series</a>
          </div>
          <canvas id="divisorwhite"></canvas>
          <!-- DARK MODE -->
          <div class="darkmode">
            <span>Dark mode</span>
            <button id="btn-darkmode">
              <span class="span-darkmode">Off</span>
              <img src="images/logo1.png" alt="logo" class="img-darkmode" />
            </button>
          </div>
        </div>
      </div>
      <!-- MAIN SECTION -->
      <div class="main-section">
        <div class="banner-container">
          <div class="text-banner">
            <span class="title">New episodes</span>
            <span class="description">Starting 21/09/10</span>
          </div>
        </div>
        <div class="banner-controlers">
          <button class="active"></button>
          <button></button>
          <button></button>
        </div>
        <div class="catalog-container">
          <span>Catalog</span>
          <div class="movies-continer">
            <div class="movie">
              <a href="#" style="background-image: url(images/movie1.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie2.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie3.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/serie1.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie4.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/serie2.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie5.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie2.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie2.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie3.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/serie1.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/movie4.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
            <div class="movie">
              <a href="#" style="background-image: url(images/serie2.jpg)">
                <img
                  src="./images/play-circle-outline.png"
                  alt="play-circle-outline"
                />
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      let btnDM = document.getElementById("btn-darkmode");
      let dark = false;

      btnDM.addEventListener("click", function () {
        if (dark) {
          let i;
          let app = document.querySelector("div.app");
          let sideBar = document.querySelector("div.sidebar");
          let banner = document.querySelector("div.banner-container");
          let search = document.querySelector("input#search");
          let lastEpesode = document.querySelectorAll("a.last-episode");
          let divisor = document.querySelectorAll("canvas.divisor");
          let imgDM = document.querySelector("img.img-darkmode");
          let spanDM = document.querySelector("span.span-darkmode");

          app.style.backgroundColor = "var(--redTheme)";
          sideBar.style.backgroundImage = "var(--gradientTheme)";
          banner.style.backgroundImage =
            "url(./images/spider.png), var(--gradientTheme)";
          search.style.backgroundColor = "var(--redTheme)";
          for (i of lastEpesode) {
            i.style.backgroundColor = "var(--redTheme)";
          }
          for (i of divisor) {
            i.style.backgroundColor = "var(--redTheme)";
          }
          imgDM.src = "./images/logo1.png";
          imgDM.style.marginLeft = "15px";
          btnDM.style.flexDirection = "row";
          spanDM.innerHTML = "Off";
          dark = false;
        } else {
          let i;
          let app = document.querySelector("div.app");
          let sideBar = document.querySelector("div.sidebar");
          let banner = document.querySelector("div.banner-container");
          let search = document.querySelector("input#search");
          let lastEpesode = document.querySelectorAll("a.last-episode");
          let divisor = document.querySelectorAll("canvas.divisor");
          let imgDM = document.querySelector("img.img-darkmode");
          let spanDM = document.querySelector("span.span-darkmode");

          app.style.backgroundColor = "var(--dark)";
          sideBar.style.backgroundImage = "var(--gradientDark)";
          banner.style.backgroundImage =
            "url(./images/spider.png), var(--gradientDark)";
          search.style.backgroundColor = "var(--dark)";
          for (i of lastEpesode) {
            i.style.backgroundColor = "var(--dark)";
          }
          for (i of divisor) {
            i.style.backgroundColor = "var(--dark)";
          }
          imgDM.src = "./images/logo2.png";
          imgDM.style.marginLeft = "-15px";
          btnDM.style.flexDirection = "row-reverse";
          spanDM.innerHTML = "On";
          dark = true;
        }
      });
    </script>
  </body>
</html>
